worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript 
             application/xml application/rss+xml application/atom+xml image/svg+xml;

  # Upstream definitions
  upstream backend_upstream {
    server backend:8000;
  }

  upstream frontend_upstream {
    server frontend:3000;
  }

  # HTTP server - redirect to HTTPS (when not behind Cloudflare)
  # When using Cloudflare, keep this for health checks
  server {
    listen 80;
    server_name _;

    # Health check endpoint for load balancers
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # Cloudflare handles SSL termination, so we accept HTTP from Cloudflare
    # The X-Forwarded-Proto header tells us the original protocol

    # Backend API
    location /api/ {
      proxy_pass http://backend_upstream/;
      proxy_http_version 1.1;
      
      # Headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Forwarded-Host $host;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      
      # WebSocket support (for Django Channels)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # WebSocket endpoint
    location /ws/ {
      proxy_pass http://backend_upstream/ws/;
      proxy_http_version 1.1;
      
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      
      # WebSocket timeouts
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
    }

    # Django admin static files
    location /static/admin/ {
      proxy_pass http://backend_upstream/static/admin/;
      proxy_set_header Host $host;
    }

    # Media files
    location /media/ {
      proxy_pass http://backend_upstream/media/;
      proxy_set_header Host $host;
    }

    # Frontend (Next.js)
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Forwarded-Host $host;
      
      # Next.js HMR WebSocket (development)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # HTTPS server (for Cloudflare Origin Certificate)
  # Uncomment this block if using Full (strict) SSL with origin certs
  # 
  # server {
  #   listen 443 ssl http2;
  #   server_name mygafflist.ie www.mygafflist.ie;
  #
  #   # Cloudflare Origin Certificate
  #   ssl_certificate /etc/nginx/ssl/origin.pem;
  #   ssl_certificate_key /etc/nginx/ssl/origin.key;
  #
  #   # SSL settings
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
  #   ssl_prefer_server_ciphers off;
  #
  #   # Same location blocks as above...
  # }
}
